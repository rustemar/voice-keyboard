name: Build & Release APK

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release-keystore.jks

      - name: Build release APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/release-keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Get version info
        id: version
        run: |
          VERSION_NAME=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          SHORT_SHA=${GITHUB_SHA::7}
          echo "name=${VERSION_NAME}" >> $GITHUB_OUTPUT
          echo "sha=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoiceKeyboard-${{ steps.version.outputs.name }}-${{ steps.version.outputs.sha }}
          path: app/build/outputs/apk/release/*.apk

      - name: Read release notes
        if: startsWith(github.ref, 'refs/tags/v')
        id: notes
        run: |
          if [ -f RELEASE_NOTES.md ]; then
            FIRST_LINE=$(head -1 RELEASE_NOTES.md)
            # If first line starts with "v" + digit (e.g. "v1.7.3 — Title"), treat it as the
            # release title and use the remainder (skipping the blank line after) as the body.
            # Otherwise fall back to using the entire file as body and let the tag name be the title.
            if [[ "$FIRST_LINE" =~ ^v[0-9] ]]; then
              TITLE="$FIRST_LINE"
              BODY=$(tail -n +3 RELEASE_NOTES.md)
            else
              TITLE=""
              BODY=$(cat RELEASE_NOTES.md)
            fi
            {
              echo "title=${TITLE}"
              echo 'body<<RELEASE_EOF'
              echo "${BODY}"
              echo 'RELEASE_EOF'
            } >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
          name: ${{ steps.notes.outputs.title }}
          body: ${{ steps.notes.outputs.body }}
          generate_release_notes: ${{ steps.notes.outputs.body == '' }}
